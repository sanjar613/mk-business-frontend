<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — MK Business</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff; --surface: #ffffff; --surface-hover: #f5f7f9;
      --text: #1a1a1a; --text-light: #717171;
      --accent: #0052cc; --accent-bright: #0066ff; --accent-dark: #003d99;
      --accent-soft: rgba(0, 102, 255, 0.08); --accent-glow: rgba(0, 102, 255, 0.12);
      --border: #e5e7eb;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        linear-gradient(135deg, rgba(0,30,80,0.75) 0%, rgba(0,82,204,0.6) 100%),
        url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=1400&q=80&auto=format&fit=crop') center/cover no-repeat;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      padding: 1.25rem; min-height: 100vh;
    }
    .login-container {
      width: 100%; max-width: 420px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 1rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25); padding: 3rem 2.5rem;
    }
    .login-brand {
      display: flex; align-items: center; gap: 0.6rem; margin-bottom: 2rem;
      text-decoration: none; color: var(--text); font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase; font-size: 0.9rem;
    }
    .login-brand img { height: 38px; width: auto; }
    .login-form h2 { font-size: 1.6rem; margin-bottom: 0.4rem; color: var(--text); font-weight: 800; }
    .login-form > p { color: var(--text-light); margin-bottom: 2rem; font-size: 0.95rem; }
    .login-form { display: grid; gap: 1.25rem; }
    label { display: grid; gap: 0.6rem; font-size: 0.9rem; color: var(--text); font-weight: 500; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); pointer-events: none; }
    .input-icon svg { width: 17px; height: 17px; stroke: var(--text-light); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    input {
      width: 100%; border-radius: 0.5rem; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      padding: 0.85rem 1rem 0.85rem 2.5rem; font-size: 0.95rem;
      transition: all 0.2s ease; font-family: inherit;
    }
    input:focus { outline: none; border-color: var(--accent-bright); background: var(--surface-hover); box-shadow: 0 0 0 3px var(--accent-soft); }
    .login-button {
      width: 100%; padding: 1rem; border-radius: 0.5rem; border: none;
      background: var(--accent-bright); color: white; font-weight: 700; font-size: 0.95rem;
      cursor: pointer; transition: all 0.3s ease; margin-top: 0.25rem; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .login-button:hover { background: var(--accent); box-shadow: 0 8px 20px rgba(0,102,255,0.3); transform: translateY(-2px); }
    .login-button:active { transform: translateY(0); }
    .hint-box {
      background: var(--accent-soft); border: 1px solid var(--accent-glow);
      border-radius: 0.5rem; padding: 0.85rem 1rem; font-size: 0.85rem;
      color: var(--accent-dark); margin-top: 0.25rem;
    }
    .hint-box strong { display: block; margin-bottom: 0.25rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 1.5rem;
      color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: gap 0.2s;
    }
    .back-link:hover { gap: 0.7rem; }
  </style>
</head>
<body>
  <div class="login-container">
    <a href="index.html" class="login-brand">
      <img src="logos/10.png" alt="MK Business" />
      <span>MK Business</span>
    </a>

    <form class="login-form" id="loginForm">
      <div>
        <h2>Admin Portal</h2>
        <p>Sign in to manage your content</p>
      </div>

      <label>
        <span>Username</span>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input type="text" id="username" placeholder="admin" autocomplete="username" value="admin" />
        </div>
      </label>

      <label>
        <span>Password</span>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
      </label>

      <button type="submit" class="login-button" id="loginBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>

      <div class="hint-box">
        <strong>Demo mode</strong>
        Вход выполняется с любым логином и паролем — просто нажмите «Sign In».
      </div>
    </form>

    <a href="index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Website
    </a>
  </div>

  <!-- ДЕМО-ВХОД: никаких запросов к бэкенду. Любые (или пустые) данные → в админку. -->
  <script>
    function demoLogin() {
      // Токен, который проверяет auth-guard в admin.html
      sessionStorage.setItem('adminToken', 'demo-token-2026');
      // Для приветствия в шапке админки
      var usernameEl = document.getElementById('username');
      localStorage.setItem('username', (usernameEl && usernameEl.value.trim()) || 'admin');
      localStorage.setItem('token', 'demo-token-2026');
      localStorage.setItem('role', 'ROLE_ADMIN');
      window.location.href = 'admin.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      demoLogin();
    });
    // Подстраховка: вход также по прямому клику на кнопку
    document.getElementById('loginBtn').addEventListener('click', function (e) {
      e.preventDefault();
      demoLogin();
    });
  </script>
</body>
</html>
